name: Release

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    name: Build And Publish
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: Install frontend dependencies
        run: npm --prefix web ci

      - name: Build release artifacts
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: bash ./scripts/ci-release-package.sh

      - name: Verify release files
        run: |
          test -f "dist/nonav-${{ github.ref_name }}-linux-amd64"
          test -f "dist/nonav-gateway-${{ github.ref_name }}-linux-amd64"
          test -f "dist/SHA256SUMS-${{ github.ref_name }}.txt"

      - name: Resolve release mode
        id: release_mode
        run: |
          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          prerelease: ${{ steps.release_mode.outputs.prerelease }}
          fail_on_unmatched_files: true
          generate_release_notes: true
          files: |
            dist/nonav-${{ github.ref_name }}-linux-amd64
            dist/nonav-gateway-${{ github.ref_name }}-linux-amd64
            dist/SHA256SUMS-${{ github.ref_name }}.txt
